[preset.0]
name="Web"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/web/index.html"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]
custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include="<meta name=\"viewport\" content=\"width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black-translucent\">\n<style>\n:root {\n	--app-width: 100vw;\n	--app-height: 100dvh;\n}\nhtml, body {\n	width: 100%;\n	height: 100%;\n	min-width: 100%;\n	min-height: 100%;\n	margin: 0;\n	padding: 0;\n	position: fixed;\n	inset: 0;\n	overflow: hidden;\n	background: #000;\n	touch-action: none;\n	overscroll-behavior: none;\n	-webkit-user-select: none;\n	user-select: none;\n	-webkit-touch-callout: none;\n}\n#canvas {\n	position: fixed !important;\n	left: 0 !important;\n	top: 0 !important;\n	width: var(--app-width) !important;\n	height: var(--app-height) !important;\n	max-width: none !important;\n	max-height: none !important;\n	object-fit: fill;\n	touch-action: none;\n}\n</style>\n<script>\n(() => {\n	const setViewportSize = () => {\n		const viewport = window.visualViewport;\n		const width = Math.round((viewport && viewport.width) || window.innerWidth || document.documentElement.clientWidth);\n		const height = Math.round((viewport && viewport.height) || window.innerHeight || document.documentElement.clientHeight);\n		document.documentElement.style.setProperty('--app-width', width + 'px');\n		document.documentElement.style.setProperty('--app-height', height + 'px');\n		const canvas = document.getElementById('canvas');\n		if (canvas) {\n			canvas.style.width = width + 'px';\n			canvas.style.height = height + 'px';\n		}\n	};\n	document.addEventListener('DOMContentLoaded', setViewportSize);\n	window.addEventListener('resize', setViewportSize, { passive: true });\n	window.addEventListener('orientationchange', () => setTimeout(setViewportSize, 250), { passive: true });\n	if (window.visualViewport) {\n		window.visualViewport.addEventListener('resize', setViewportSize, { passive: true });\n		window.visualViewport.addEventListener('scroll', setViewportSize, { passive: true });\n	}\n	setViewportSize();\n})();\n</script>"
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=true
progressive_web_app/offline_page=""
progressive_web_app/display=0
progressive_web_app/orientation=2
progressive_web_app/icon_144x144=""
progressive_web_app/icon_180x180=""
progressive_web_app/icon_512x512=""
progressive_web_app/background_color=Color(0, 0, 0, 1)
